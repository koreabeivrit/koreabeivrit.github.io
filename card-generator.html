<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Generator — Korea Be'ivrit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8; --surface: #fff; --border: #e8e2d8;
      --text: #1a1612; --muted: #9b8c78; --radius: 6px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
    .page { max-width: 960px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 40px; direction: rtl; }
    header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; margin-bottom: 6px; }
    header p { font-size: 14px; color: var(--muted); }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .field input, .field textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: #fff; outline: none; transition: border-color .18s; direction: ltr; }
    .field input:focus, .field textarea:focus { border-color: var(--text); }
    .field textarea { height: 70px; resize: vertical; }
    .url-row { display: flex; gap: 8px; }
    .url-row input { flex: 1; }
    .img-row { display: flex; gap: 8px; align-items: stretch; }
    .img-row input { flex: 1; }
    .status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 18px; }
    .status.ok { color: #2a7a4f; }
    .status.err { color: #b94040; }
    button { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 16px; border: 1.5px solid var(--text); border-radius: var(--radius); background: #fff; color: var(--text); cursor: pointer; transition: background .15s, color .15s; white-space: nowrap; }
    button:hover { background: var(--text); color: #fff; }
    button.primary { background: var(--text); color: #fff; }
    button.primary:hover { opacity: .85; }
    .upload-btn { position: relative; overflow: hidden; flex-shrink: 0; }
    .upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .style-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { font-size: 12px; padding: 5px 12px; border-radius: 50px; border: 1.5px solid var(--border); background: #fff; color: var(--muted); cursor: pointer; transition: all .15s; }
    .pill.active { border-color: var(--text); background: var(--text); color: #fff; }
    .img-thumb { width: 100%; height: 60px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); margin-top: 6px; display: none; }
    .action-row { display: flex; gap: 8px; margin-top: 20px; }
    .action-row button { flex: 1; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    /* ── Preview wrap: 프리뷰는 시각적으로 작게 ── */
    .preview-wrap {
      background: #1a1612;
      border-radius: 0px;
      padding: 20px;
      display: flex;
      justify-content: center;
      position: sticky;
      top: 20px;
    }

    /* 스케일 컨테이너: 실제 크기의 0.3배 공간만 차지 */
    .card-scale-wrap {
      width: 324px;   /* 1080 × 0.3 */
      height: 405px;  /* 1350 × 0.3 */
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 0px;
    }

    /* 카드 실제 DOM 크기: 1080×1350 → transform으로 시각적 축소 */
    #card {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1350px;
      border-radius: 0px;
      overflow: hidden;
      background: #1a1612;
      transform: scale(0.3);
      transform-origin: top left;
    }

    #card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
    #card-overlay { position: absolute; inset: 0; }
    #card-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: 93px 86px;   /* 28×3.33, 26×3.33 */
      direction: rtl;
    }

    #card-badge {
      font-size: 33px;
      font-weight: 600;
      width: fit-content;
      line-height: 1.65;
      padding: 13px 40px;
      letter-spacing: 0;
      text-transform: none;
      border-radius: 165px;
      background: rgba(255,255,255,.16);
      color: #fff;
      border: 3px solid rgba(255,255,255,.28);
      margin-bottom: auto;
    }

    #card-bottom { margin-top: auto; }

    #card-logo {
      font-size: 33px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      margin-bottom: 26px;
    }

    #card-title {
      font-family: sans-serif;
      font-size: 80px;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      margin-bottom: 33px;
      direction: rtl;
    }

    #card-sub {
      font-family: 'Noto Sans Hebrew', 'DM Sans', sans-serif;
      font-size: 40px;
      line-height: 1.65;
      color: rgba(255,255,255,.65);
      margin-bottom: 46px;
      display: none;
      direction: rtl;
    }

    #card-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      line-height: 1;
      gap: 20px;
      padding: 26px 53px;
      border-radius: 165px;
      font-size: 36px;
      font-weight: 600;
      background: rgba(255,255,255,.16);
      color: #fff;
      border: 3px solid rgba(255,255,255,.32);
      width: fit-content;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>Instagram Card Generator</h1>
    <p>가장 최신 글을 fetch → image는 직접 업로드 → PNG 저장</p>
  </header>
  <div class="layout">
    <div>
      <div class="panel">
        <div class="panel-title">포스트 불러오기</div>
        <div class="field">
          <label>포스트 URL</label>
          <div class="url-row">
            <input type="text" id="url-in" placeholder="https://koreabeivrit.blogspot.com/..." />
            <button onclick="fetchPost()">가져오기</button>
          </div>
          <div class="status" id="status">URL을 붙여넣고 가져오기를 누르세요</div>
        </div>
      </div>

      <div class="panel" style="margin-top:16px;">
        <div class="panel-title">카드 내용</div>
        <div class="field">
          <label>제목</label>
          <textarea id="f-title" placeholder="포스트 제목" oninput="render()"></textarea>
        </div>
        <div class="field">
          <label>한 줄 요약 (선택)</label>
          <textarea id="f-sub" placeholder="짧은 설명..." oninput="render()"></textarea>
        </div>

        <a id="open-post" target="_blank" style="display:block; margin-bottom:14px;">
          <button class="primary" style="width:100%;">포스트 열기</button>
        </a>

        <div class="field">
          <label>이미지</label>
          <div class="img-row">
            <input type="text" id="f-img" placeholder="URL 직접 입력..." oninput="onUrlInput()" />
            <button class="upload-btn">업로드<input type="file" accept="image/*" onchange="onFileUpload(this)" /></button>
          </div>
          <img id="img-thumb" class="img-thumb" alt="" />
        </div>

        <div class="field">
          <label>채널명</label>
          <input type="text" id="f-logo" value="koreabeivrit@" oninput="render()" />
        </div>
        <div class="field">
          <label>배지 텍스트</label>
          <input type="text" id="f-badge" value="קוריאהבעברית" oninput="render()" />
        </div>
        <div class="field">
          <label>CTA 문구</label>
          <input type="text" id="f-cta" value="קרא עוד ←" oninput="render()" />
        </div>
        <div class="field">
          <label>오버레이 스타일</label>
          <div class="style-pills">
            <button class="pill active" data-style="dark-bottom" onclick="setStyle(this)">하단 어둠</button>
            <button class="pill" data-style="dark-full" onclick="setStyle(this)">전체 어둠</button>
            <button class="pill" data-style="dark-top" onclick="setStyle(this)">상단 어둠</button>
            <button class="pill" data-style="tint" onclick="setStyle(this)">틴트</button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="primary" onclick="downloadCard()">PNG 저장 (1080×1350)</button>
      </div>
      <p class="hint">* 업로드 이미지 사용 시 CORS 없이 저장됩니다<br>* Apple 기기: 공유 시트 → 사진에 저장</p>
    </div>

    <div>
      <div class="preview-wrap">
        <div class="card-scale-wrap">
          <div id="card">
            <div id="card-bg"></div>
            <div id="card-overlay"></div>
            <div id="card-content">
              <div id="card-badge">קוריאהבעברית</div>
              <div id="card-bottom">
                <div id="card-logo">koreabeivrit@</div>
                <div id="card-title">제목이 여기에 표시됩니다</div>
                <div id="card-sub"></div>
                <div id="card-cta">קרא עוד ←</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentStyle = 'dark-bottom';
  let localSrc = null;

  const overlays = {
    'dark-bottom': 'linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.25) 55%, rgba(0,0,0,0.04) 100%)',
    'dark-full':   'rgba(0,0,0,0.55)',
    'dark-top':    'linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.04) 100%)',
    'tint':        'rgba(26,22,18,0.62)'
  };

  function setStyle(btn) {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    render();
  }

  function onFileUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      localSrc = e.target.result;
      document.getElementById('f-img').value = '';
      showThumb(localSrc);
      render();
    };
    reader.readAsDataURL(file);
  }

  function onUrlInput() {
    localSrc = null;
    hideThumb();
    render();
  }

  function showThumb(src) {
    const t = document.getElementById('img-thumb');
    t.src = src; t.style.display = 'block';
  }

  function hideThumb() {
    const t = document.getElementById('img-thumb');
    t.src = ''; t.style.display = 'none';
  }

  function render() {
    const title = document.getElementById('f-title').value;
    const sub   = document.getElementById('f-sub').value;
    const logo  = document.getElementById('f-logo').value;
    const badge = document.getElementById('f-badge').value;
    const cta   = document.getElementById('f-cta').value;

    document.getElementById('card-title').textContent = title || '제목이 여기에 표시됩니다';
    document.getElementById('card-logo').textContent  = logo;
    document.getElementById('card-badge').textContent = badge;
    document.getElementById('card-cta').textContent   = cta;

    const subEl = document.getElementById('card-sub');
    if (sub.trim()) { subEl.textContent = sub; subEl.style.display = 'block'; }
    else { subEl.style.display = 'none'; }

    const bg = document.getElementById('card-bg');
    if (localSrc) {
      bg.style.backgroundImage = 'url(' + localSrc + ')';
      bg.style.backgroundColor = '#111';
    } else {
      bg.style.backgroundImage = 'none';
      bg.style.backgroundColor = '#1a1612';
    }

    document.getElementById('card-overlay').style.background = overlays[currentStyle];
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  async function fetchPost(customUrl) {
    const url = customUrl || document.getElementById('url-in').value.trim();
    if (!url) return;
    setStatus('가져오는 중...');
    try {
      const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
      const res = await fetch(proxy);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const html = await res.text();
      const doc  = new DOMParser().parseFromString(html, 'text/html');

      const title = doc.querySelector('meta[property="og:title"]')?.content
                 || doc.querySelector('title')?.textContent || '';
      const desc  = doc.querySelector('meta[property="og:description"]')?.content || '';

      document.getElementById('open-post').href = url;
      document.getElementById('f-title').value = title;
      document.getElementById('f-sub').value   = desc.slice(0, 80) + (desc.length > 80 ? '…' : '');
      document.getElementById('f-img').value   = '';
      localSrc = null;
      hideThumb();
      render();
      setStatus('텍스트 불러오기 완료 — 이미지를 업로드하세요', 'ok');
    } catch(e) {
      setStatus('오류: ' + e.message, 'err');
    }
  }

  async function downloadCard() {
    await document.fonts.load('700 80px "Noto Sans Hebrew"');
    await document.fonts.ready;

    const card = document.getElementById('card');

    // transform 일시 제거 → html2canvas가 1080×1350 그대로 캡처
    card.style.transform = 'none';

    try {
      const canvas = await html2canvas(card, {
        scale: 1,            // DOM 크기 그대로 (1080×1350)
        useCORS: false,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        width: 1080,
        height: 1350
      });

      card.style.transform = 'scale(0.3)'; // 복원

      canvas.toBlob(async blob => {
        const file = new File([blob], 'insta-card.png', { type: 'image/png' });
        const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
        if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
          try { await navigator.share({ files: [file], title: 'Instagram Card' }); return; }
          catch(e) {}
        }
        const a = document.createElement('a');
        a.download = 'insta-card.png';
        a.href = URL.createObjectURL(blob);
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      }, 'image/png');

    } catch(e) {
      card.style.transform = 'scale(0.3)';
      alert('저장 오류: ' + e.message);
    }
  }

  async function loadLatestPost() {
    try {
      setStatus('최신 포스트 불러오는 중...');
      const feedUrl = 'https://koreabeivrit.blogspot.com/feeds/posts/default?alt=json&max-results=1';
      const proxy   = 'https://corsproxy.io/?' + encodeURIComponent(feedUrl);
      const res  = await fetch(proxy);
      if (!res.ok) throw new Error('feed fetch failed');
      const data = await res.json();
      const entry = data.feed.entry?.[0];
      if (!entry) throw new Error('no posts');
      const postUrl = entry.link.find(l => l.rel === 'alternate').href;
      document.getElementById('url-in').value = postUrl;
      await fetchPost(postUrl);
    } catch(e) {
      console.warn(e);
      setStatus('최신 포스트 자동 로드 실패', 'err');
    }
  }

  render();
  loadLatestPost();
</script>
</body>
</html>
